<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🐷 小猪跑酷（完整版）</title>
  <style>
    body { margin:0; text-align:center; font-family:Arial; background:linear-gradient(#87ceeb,#90ee90);} 
    #game { position:relative; width:300px; height:500px; margin:20px auto; background:#ccc; overflow:hidden; border:4px solid #333; border-radius:10px; }
    .pig,.item,.obstacle { position:absolute; transform:translateX(-50%); font-size:30px; }
    .pig { bottom:10px; transition:left 0.2s; }
    button { padding:8px 16px; margin-top:10px; }
  </style>
</head>
<body>
  <h2>🐷 小猪跑酷（稳定版）</h2>
  <p>得分：<span id="score">0</span></p>
  <div id="game"></div>
  <div id="over" style="display:none;">
    <h3 id="final"></h3>
    <button onclick="restart()">重新开始</button>
  </div>

<script>
const game = document.getElementById('game');
const scoreEl = document.getElementById('score');
const overEl = document.getElementById('over');
const finalEl = document.getElementById('final');

let lane=1, score=0, jumping=false, gameOver=false;
let items=[], obstacles=[];
const lanes=['20%','50%','80%'];

// 🐷
const pig=document.createElement('div');
pig.className='pig';
pig.innerHTML='🐷';
pig.style.left=lanes[lane];
game.appendChild(pig);

// 🍍
function spawnItem(){
  if(gameOver) return;
  const el=document.createElement('div');
  el.className='item'; el.innerHTML='🍍';
  el.dataset.lane=Math.floor(Math.random()*3);
  el.style.left=lanes[el.dataset.lane];
  el.style.top='0%';
  game.appendChild(el);
  items.push(el);
}

// 💩
function spawnObstacle(){
  if(gameOver) return;
  const el=document.createElement('div');
  el.className='obstacle'; el.innerHTML='💩';
  el.dataset.lane=Math.floor(Math.random()*3);
  el.style.left=lanes[el.dataset.lane];
  el.style.top='0%';
  game.appendChild(el);
  obstacles.push(el);
}

// 更新
function update(){
  if(gameOver) return;

  items = items.filter(el=>{
    let y=parseFloat(el.style.top)||0;
    y+=2; el.style.top=y+'%';
    if(y>90){
      if(parseInt(el.dataset.lane)===lane){
        score++; scoreEl.innerText=score;
      }
      el.remove();
      return false;
    }
    return true;
  });

  obstacles = obstacles.filter(el=>{
    let y=parseFloat(el.style.top)||0;
    y+=2; el.style.top=y+'%';
    if(y>85){
      if(parseInt(el.dataset.lane)===lane && !jumping){
        endGame();
      }
      el.remove();
      return false;
    }
    return true;
  });
}

function endGame(){
  gameOver=true;
  overEl.style.display='block';
  finalEl.innerText='💀 游戏结束！得分：'+score;
}

function restart(){
  location.reload();
}

// 手势
let startX=0,startY=0;

game.addEventListener('touchstart',e=>{
  startX=e.touches[0].clientX;
  startY=e.touches[0].clientY;
});

game.addEventListener('touchend',e=>{
  if(gameOver) return;
  const dx=e.changedTouches[0].clientX-startX;
  const dy=e.changedTouches[0].clientY-startY;

  if(Math.abs(dx)>Math.abs(dy)){
    if(dx>30) lane=Math.min(2,lane+1);
    if(dx<-30) lane=Math.max(0,lane-1);
  }else{
    if(dy<-30 && !jumping){
      jumping=true;
      pig.style.bottom='120px';
      setTimeout(()=>{
        jumping=false;
        pig.style.bottom='10px';
      },500);
    }
  }
  pig.style.left=lanes[lane];
});

// 循环
setInterval(spawnItem,800);
setInterval(spawnObstacle,1200);
setInterval(update,30);
</script>
</body>
</html>
