<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>🐷 小猪跑酷 Ultimate</title>
<style>
body { margin:0; overflow:hidden; }
#score {
    position:absolute;
    top:20px;
    left:20px;
    color:white;
    font-size:24px;
}
</style>
</head>

<body>
<div id="score">0</div>

<script type="module">
import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js";
import { GLTFLoader } from "https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/loaders/GLTFLoader.js";

/* ========= 场景 ========= */
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

/* ========= 光 ========= */
const light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(5,10,5);
scene.add(light);

/* ========= 地面 ========= */
const grounds = [];
function createGround(z){
    const geo = new THREE.PlaneGeometry(10,50);
    const mat = new THREE.MeshStandardMaterial({color:0xd2b48c});
    const g = new THREE.Mesh(geo,mat);
    g.rotation.x = -Math.PI/2;
    g.position.z = z;
    scene.add(g);
    grounds.push(g);
}
for(let i=0;i<6;i++) createGround(-i*50);

/* ========= 小猪（用Fox模型代替+动画） ========= */
let pig, mixer;
const loader = new GLTFLoader();

loader.load(
"https://threejs.org/examples/models/gltf/Fox.glb",
gltf=>{
    pig = gltf.scene;
    pig.scale.set(0.02,0.02,0.02);
    pig.position.y = 0.5;
    scene.add(pig);

    mixer = new THREE.AnimationMixer(pig);
    const action = mixer.clipAction(gltf.animations[0]);
    action.play();
});

/* ========= 游戏数据 ========= */
let lane = 1;
let velocityY = 0;
let isJumping = false;
let speed = 0.2;
let score = 0;

const lanes = [-3,0,3];
let obstacles = [];
let coins = [];

/* ========= 障碍 ========= */
function spawnObstacle(){
    const geo = new THREE.BoxGeometry(1,1,1);
    const mat = new THREE.MeshStandardMaterial({color:0x654321});
    const o = new THREE.Mesh(geo,mat);
    o.position.set(lanes[Math.floor(Math.random()*3)],0.5,-60);
    scene.add(o);
    obstacles.push(o);
}

/* ========= 金币 ========= */
function spawnCoin(){
    const geo = new THREE.TorusGeometry(0.5,0.2,8,16);
    const mat = new THREE.MeshStandardMaterial({color:0xffd700});
    const c = new THREE.Mesh(geo,mat);
    c.position.set(lanes[Math.floor(Math.random()*3)],1,-60);
    scene.add(c);
    coins.push(c);
}

/* ========= 控制 ========= */
document.addEventListener("keydown",e=>{
    if(e.key==="ArrowLeft") lane=Math.max(0,lane-1);
    if(e.key==="ArrowRight") lane=Math.min(2,lane+1);
    if(e.key==="ArrowUp" && !isJumping){
        velocityY=0.25;
        isJumping=true;
    }
});

/* ========= 碰撞 ========= */
function hit(a,b){
    return new THREE.Box3().setFromObject(a)
        .intersectsBox(new THREE.Box3().setFromObject(b));
}

/* ========= 主循环 ========= */
const clock = new THREE.Clock();

function animate(){
    requestAnimationFrame(animate);

    const dt = clock.getDelta();
    if(mixer) mixer.update(dt);

    speed += 0.0003;

    if(pig){
        pig.position.x += (lanes[lane]-pig.position.x)*0.2;

        pig.position.y += velocityY;
        velocityY -= 0.01;

        if(pig.position.y<=0.5){
            pig.position.y=0.5;
            isJumping=false;
        }

        camera.position.set(pig.position.x, pig.position.y+4, 10);
        camera.lookAt(pig.position);
    }

    /* 地面循环 */
    grounds.forEach(g=>{
        g.position.z += speed;
        if(g.position.z>50){
            g.position.z -= 300;
        }
    });

    /* 障碍 */
    obstacles.forEach((o,i)=>{
        o.position.z += speed;

        if(pig && hit(pig,o)){
            alert("游戏结束 得分："+score);
            location.reload();
        }

        if(o.position.z>10){
            scene.remove(o);
            obstacles.splice(i,1);
            score+=10;
        }
    });

    /* 金币 */
    coins.forEach((c,i)=>{
        c.rotation.y+=0.1;
        c.position.z+=speed;

        if(pig && hit(pig,c)){
            scene.remove(c);
            coins.splice(i,1);
            score+=50;
        }

        if(c.position.z>10){
            scene.remove(c);
            coins.splice(i,1);
        }
    });

    document.getElementById("score").innerText = score;

    renderer.render(scene,camera);
}

/* ========= 生成 ========= */
setInterval(spawnObstacle,1200);
setInterval(spawnCoin,800);

animate();
</script>
</body>
</html>
