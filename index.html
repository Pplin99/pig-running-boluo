<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" />
    <title>🐷 乡村小猪跑酷 3D</title>
    <style>
        :root {
            --grass-color: #7cfc00;
            --path-color: #d2b48c;
        }
        body {
            margin: 0;
            text-align: center;
            font-family: 'Microsoft YaHei', sans-serif;
            background: #87ceeb;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 3D 场景容器 */
        #game-container {
            position: relative;
            width: 100vw;
            height: 80vh;
            perspective: 800px; /* 透视效果的关键 */
            background: linear-gradient(#87ceeb 60%, #7cfc00 60%);
            overflow: hidden;
        }

        /* 3D 跑道 */
        #world {
            position: absolute;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            transform: rotateX(60deg); /* 倾斜地面形成透视视角 */
            bottom: -150px;
        }

        .road {
            position: absolute;
            width: 300px;
            height: 2000px;
            background: var(--path-color);
            left: 50%;
            transform: translateX(-50%);
            border-left: 10px solid #8b4513;
            border-right: 10px solid #8b4513;
            background-image: repeating-linear-gradient(0deg, transparent, transparent 100px, rgba(0,0,0,0.1) 105px);
        }

        /* 小猪角色 */
        #pig {
            position: absolute;
            bottom: 100px;
            left: 50%;
            width: 60px;
            height: 60px;
            transform: translateX(-50%) rotateX(-60deg); /* 抵消地面旋转，保持站立 */
            font-size: 50px;
            transition: left 0.15s ease-out, bottom 0.2s;
            z-index: 100;
            filter: drop-shadow(0 10px 5px rgba(0,0,0,0.3));
        }

        /* 3D 障碍物 (猪粪便) */
        .obstacle {
            position: absolute;
            width: 40px;
            height: 40px;
            transform-style: preserve-3d;
            transform: translateX(-50%) rotateX(-60deg);
            font-size: 30px;
            z-index: 50;
        }
        
        .poop-3d {
            animation: bounce 0.5s infinite alternate;
        }

        @keyframes bounce {
            from { transform: translateX(-50%) rotateX(-60deg) translateY(0); }
            to { transform: translateX(-50%) rotateX(-60deg) translateY(-10px); }
        }

        /* UI 元素 */
        #score-board { font-size: 24px; padding: 10px; font-weight: bold; color: white; text-shadow: 1px 1px 2px #000; }
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); display: flex; justify-content: center; align-items: center; z-index: 200;
        }
        .btn-start { padding: 15px 40px; font-size: 24px; background: #ffcc00; border: none; border-radius: 30px; cursor: pointer; font-weight: bold; }
        .btn-close {
            position: absolute; top: 15px; right: 15px; width: 40px; height: 40px;
            background: #ff4444; color: white; border: 3px solid white; border-radius: 50%; cursor: pointer; z-index: 210; font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="score-board">🌻 农场得分：<span id="score">0</span></div>

    <div id="game-container">
        <button class="btn-close" id="closeBtn">X</button>
        <div id="world">
            <div class="road"></div>
            <div id="pig">🐷</div>
        </div>

        <div id="ui-layer">
            <button class="btn-start" id="startBtn">进入农场</button>
        </div>
    </div>

    <div style="color:white; margin-top:10px;">方向键左右移动 | 滑动手机屏幕控制</div>

    <script>
        const world = document.getElementById("world");
        const pig = document.getElementById("pig");
        const scoreEl = document.getElementById("score");
        const uiLayer = document.getElementById("ui-layer");
        const startBtn = document.getElementById("startBtn");
        const closeBtn = document.getElementById("closeBtn");

        let lane = 1;
        let score = 0;
        let isRunning = false;
        const laneX = ["calc(50% - 100px)", "50%", "calc(50% + 100px)"];
        let obstacles = [], timers = [];

        function startGame() {
            isRunning = true;
            uiLayer.style.display = "none";
            score = 0;
            lane = 1;
            scoreEl.innerText = score;
            pig.style.left = laneX[lane];
            
            // 清理旧障碍物
            obstacles.forEach(o => o.remove());
            obstacles = [];

            timers.push(setInterval(spawnObstacle, 800));
            timers.push(setInterval(update, 20));
        }

        function spawnObstacle() {
            if (!isRunning) return;
            const obs = document.createElement("div");
            obs.className = "obstacle poop-3d";
            obs.innerHTML = "💩"; 
            const l = Math.floor(Math.random() * 3);
            obs.dataset.lane = l;
            obs.style.left = laneX[l];
            obs.style.top = "0px"; // 远处
            world.appendChild(obs);
            obstacles.push(obs);
        }

        function update() {
            if (!isRunning) return;

            obstacles.forEach((obs, i) => {
                let top = parseFloat(obs.style.top || 0);
                top += 12; // 移动速度
                obs.style.top = top + "px";

                // 简单的碰撞检测：当障碍物靠近底部且在同一赛道
                if (top > 1600 && top < 1750) {
                    if (parseInt(obs.dataset.lane) === lane) {
                        endGame();
                    }
                }

                if (top > 2000) {
                    score += 1;
                    scoreEl.innerText = score;
                    obs.remove();
                    obstacles.splice(i, 1);
                }
            });
        }

        function endGame() {
            isRunning = false;
            timers.forEach(t => clearInterval(t));
            uiLayer.style.display = "flex";
            uiLayer.innerHTML = `
                <div style="color:white;text-align:center;">
                    <h2 style="font-size:40px;">💥 哎呀!</h2>
                    <p>小猪撞到了便便，得分：${score}</p>
                    <button class="btn-start" onclick="location.reload()">再来一局</button>
                </div>`;
        }

        // 控制逻辑
        function move(dir) {
            if (!isRunning) return;
            if (dir === 'left') lane = Math.max(0, lane - 1);
            if (dir === 'right') lane = Math.min(2, lane + 1);
            pig.style.left = laneX[lane];
        }

        window.addEventListener("keydown", e => {
            if (e.key === "ArrowLeft") move('left');
            if (e.key === "ArrowRight") move('right');
        });

        let startX = 0;
        document.addEventListener("touchstart", e => startX = e.touches[0].clientX);
        document.addEventListener("touchend", e => {
            const dx = e.changedTouches[0].clientX - startX;
            if (dx > 30) move('right');
            if (dx < -30) move('left');
        });

        startBtn.onclick = startGame;
        closeBtn.onclick = () => { if(isRunning) endGame(); };
    </script>
</body>
</html>
