<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>🐷 小猪跑酷 3D Pro MAX</title>
<style>
body { margin:0; overflow:hidden; }
#score {
    position:absolute;
    top:20px;
    left:20px;
    color:white;
    font-size:24px;
}
</style>
</head>

<body>
<div id="score">0</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160/build/three.min.js"></script>

<script>
/* ========= 基础 ========= */
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0,5,10);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

/* ========= 光 ========= */
const light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(0,10,10);
scene.add(light);

/* ========= 地面 ========= */
const groundGeo = new THREE.PlaneGeometry(10,200);
const groundMat = new THREE.MeshStandardMaterial({color:0xd2b48c});
const ground = new THREE.Mesh(groundGeo,groundMat);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

/* ========= 小猪 ========= */
const pig = new THREE.Mesh(
    new THREE.BoxGeometry(1,1,1),
    new THREE.MeshStandardMaterial({color:0xff99aa})
);
pig.position.y = 0.5;
scene.add(pig);

/* ========= 数据 ========= */
let lane = 0;
let velocityY = 0;
let isJumping = false;
let speed = 0.2;
let score = 0;

const lanes = [-3,0,3];

let obstacles = [];
let coins = [];

/* ========= 生成 ========= */
function spawnObstacle(){
    const o = new THREE.Mesh(
        new THREE.BoxGeometry(1,1,1),
        new THREE.MeshStandardMaterial({color:0x654321})
    );
    o.position.set(lanes[Math.floor(Math.random()*3)],0.5,-50);
    scene.add(o);
    obstacles.push(o);
}

function spawnCoin(){
    const c = new THREE.Mesh(
        new THREE.SphereGeometry(0.4,16,16),
        new THREE.MeshStandardMaterial({color:0xffd700})
    );
    c.position.set(lanes[Math.floor(Math.random()*3)],1,-50);
    scene.add(c);
    coins.push(c);
}

/* ========= 控制 ========= */
document.addEventListener("keydown",e=>{
    if(e.key==="ArrowLeft") lane = Math.max(0,lane-1);
    if(e.key==="ArrowRight") lane = Math.min(2,lane+1);

    if(e.key==="ArrowUp" && !isJumping){
        velocityY = 0.25;
        isJumping = true;
    }
});

/* ========= 手势 ========= */
let sx,sy;
document.addEventListener("touchstart",e=>{
    sx = e.touches[0].clientX;
    sy = e.touches[0].clientY;
});

document.addEventListener("touchend",e=>{
    let dx = e.changedTouches[0].clientX - sx;
    let dy = e.changedTouches[0].clientY - sy;

    if(Math.abs(dx)>Math.abs(dy)){
        if(dx>30) lane = Math.min(2,lane+1);
        if(dx<-30) lane = Math.max(0,lane-1);
    }else{
        if(dy<-30 && !isJumping){
            velocityY = 0.25;
            isJumping = true;
        }
    }
});

/* ========= 碰撞 ========= */
function checkCollision(a,b){
    const box1 = new THREE.Box3().setFromObject(a);
    const box2 = new THREE.Box3().setFromObject(b);
    return box1.intersectsBox(box2);
}

/* ========= 主循环 ========= */
function animate(){
    requestAnimationFrame(animate);

    speed += 0.0002;

    /* 移动小猪 */
    pig.position.x += (lanes[lane]-pig.position.x)*0.2;

    /* 跳跃物理 */
    pig.position.y += velocityY;
    velocityY -= 0.01;

    if(pig.position.y <= 0.5){
        pig.position.y = 0.5;
        isJumping = false;
    }

    /* 摄像机跟随 */
    camera.position.x = pig.position.x;
    camera.position.y = pig.position.y + 4;
    camera.lookAt(pig.position);

    /* 障碍移动 */
    obstacles.forEach((o,i)=>{
        o.position.z += speed;

        if(checkCollision(pig,o)){
            alert("游戏结束 得分："+score);
            location.reload();
        }

        if(o.position.z>10){
            scene.remove(o);
            obstacles.splice(i,1);
            score+=10;
        }
    });

    /* 金币 */
    coins.forEach((c,i)=>{
        c.rotation.y += 0.1;
        c.position.z += speed;

        if(checkCollision(pig,c)){
            scene.remove(c);
            coins.splice(i,1);
            score+=50;
        }

        if(c.position.z>10){
            scene.remove(c);
            coins.splice(i,1);
        }
    });

    document.getElementById("score").innerText = score;

    renderer.render(scene,camera);
}

/* ========= 定时生成 ========= */
setInterval(spawnObstacle,1200);
setInterval(spawnCoin,800);

animate();
</script>

</body>
</html>
