<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" />
    <title>🐷 乡村小猪跑酷 3D - 终极视角版</title>
    <style>
        :root {
            --grass-color: #7cfc00;
            --path-color: #d2b48c;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 0;
            background: #87ceeb;
            height: 100vh; width: 100vw;
            overflow: hidden;
            display: flex; flex-direction: column;
            font-family: 'Microsoft YaHei', sans-serif;
        }

        /* 核心游戏容器 */
        #game-window {
            position: relative;
            width: 100%;
            height: 100%;
            background: linear-gradient(#87ceeb 40%, var(--grass-color) 40%);
            perspective: 1200px; /* 强化透视 */
            perspective-origin: 50% 20%; /* 关键：视点抬高 */
        }

        /* 3D 世界 */
        #world {
            position: absolute;
            width: 100%; height: 100%;
            top: 0; left: 0;
            transform-style: preserve-3d;
            transform: rotateX(65deg); /* 让地面平躺形成梯形 */
            transform-origin: center bottom;
        }

        /* 跑道：下大上小的梯形感来自 rotateX */
        .road {
            position: absolute;
            width: 450px; /* 电脑端宽度 */
            height: 10000px; /* 极长 */
            background: var(--path-color);
            left: 50%;
            bottom: 0; /* 从底部开始生长 */
            transform: translateX(-50%);
            border-left: 15px solid #8b4513;
            border-right: 15px solid #8b4513;
            /* 跑道线条动画：模拟移动感 */
            background-image: repeating-linear-gradient(0deg, transparent, transparent 100px, rgba(0,0,0,0.1) 105px);
            animation: roadMove 2s linear infinite;
        }

        @keyframes roadMove {
            from { background-position: 0 0; }
            to { background-position: 0 1000px; }
        }

        /* 小猪：放在屏幕最下方（近端） */
        #pig {
            position: absolute;
            bottom: 80px; /* 靠近玩家这一侧 */
            left: 50%;
            width: 80px; height: 80px;
            font-size: 65px;
            z-index: 1000;
            transform: translateX(-50%) rotateX(-65deg); /* 抵消倾斜，正对玩家 */
            transition: left 0.1s ease-out;
            filter: drop-shadow(0 20px 10px rgba(0,0,0,0.4));
        }

        /* 障碍物：从远方出现 */
        .obstacle {
            position: absolute;
            width: 60px; height: 60px;
            font-size: 45px;
            z-index: 500;
            transform: translateX(-50%) rotateX(-65deg);
            /* 初始在跑道远端 */
            top: -2000px; 
        }

        /* UI 样式 */
        #score-board {
            position: absolute; top: 20px; left: 20px; z-index: 2000;
            font-size: 24px; color: white; background: rgba(0,0,0,0.4);
            padding: 8px 20px; border-radius: 30px;
        }
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); display: flex; justify-content: center;
            align-items: center; z-index: 3000; backdrop-filter: blur(8px);
        }
        .btn-start { padding: 15px 60px; font-size: 30px; background: #ffcc00; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; }
        .btn-close {
            position: absolute; top: 20px; right: 20px; width: 50px; height: 50px;
            background: #ff4444; border: 3px solid white; border-radius: 50%;
            color: white; font-size: 24px; z-index: 2000; cursor: pointer;
        }

        /* 手机适配 */
        @media (max-width: 600px) {
            .road { width: 90vw; }
            #pig { width: 60px; font-size: 50px; bottom: 120px; }
        }
    </style>
</head>
<body>

    <div id="game-window">
        <div id="score-board">🌾 农场积分：<span id="score">0</span></div>
        <button class="btn-close" id="closeBtn">X</button>

        <div id="world">
            <div class="road" id="road"></div>
            </div>
        <div id="pig">🐷</div>

        <div id="ui-layer">
            <button class="btn-start" id="startBtn">开始挑战</button>
        </div>
    </div>

    <script>
        const world = document.getElementById("world");
        const pig = document.getElementById("pig");
        const scoreEl = document.getElementById("score");
        const uiLayer = document.getElementById("ui-layer");
        const road = document.getElementById("road");

        let lane = 1;
        let score = 0;
        let isRunning = false;
        
        const getLaneX = () => {
            const rWidth = road.offsetWidth;
            return [
                `calc(50% - ${rWidth/3.2}px)`,
                `50%`,
                `calc(50% + ${rWidth/3.2}px)`
            ];
        };

        let currentLanes = getLaneX();
        let obstacles = [], timers = [];

        function startGame() {
            isRunning = true;
            uiLayer.style.display = "none";
            score = 0; lane = 1;
            scoreEl.innerText = score;
            currentLanes = getLaneX();
            pig.style.left = currentLanes[lane];
            
            obstacles.forEach(o => o.remove());
            obstacles = [];
            
            // 降低生成频率和更新频率，使动作更平滑
            timers.push(setInterval(spawnObstacle, 1500)); // 每1.5秒一个
            timers.push(setInterval(update, 20)); 
        }

        function spawnObstacle() {
            if (!isRunning) return;
            const obs = document.createElement("div");
            obs.className = "obstacle";
            obs.innerHTML = "💩"; 
            const l = Math.floor(Math.random() * 3);
            obs.dataset.lane = l;
            obs.style.left = currentLanes[l];
            obs.style.top = "0px"; // 远端
            world.appendChild(obs);
            obstacles.push(obs);
        }

        function update() {
            if (!isRunning) return;

            obstacles.forEach((obs, i) => {
                let top = parseFloat(obs.style.top || 0);
                top += 8; // *** 减慢速度，这里原先是15 ***
                obs.style.top = top + "px";

                // 碰撞检测逻辑：根据现在的 3D 视角，
                // 只有当障碍物移动到跑道最下方（近端）时才会撞上小猪
                if (top > 850 && top < 980) { 
                    if (parseInt(obs.dataset.lane) === lane) {
                        endGame();
                    }
                }

                if (top > 1200) {
                    score += 10;
                    scoreEl.innerText = score;
                    obs.remove();
                    obstacles.splice(i, 1);
                }
            });
        }

        function endGame() {
            isRunning = false;
            timers.forEach(t => clearInterval(t));
            uiLayer.style.display = "flex";
            uiLayer.innerHTML = `
                <div style="color:white;text-align:center;">
                    <h2 style="font-size:32px;">挑战结束！</h2>
                    <p style="font-size:20px;">最终得分：${score}</p>
                    <button class="btn-start" onclick="location.reload()">重新跑一次</button>
                </div>`;
        }

        // 控制逻辑
        function move(dir) {
            if (!isRunning) return;
            if (dir === 'left') lane = Math.max(0, lane - 1);
            if (dir === 'right') lane = Math.min(2, lane + 1);
            pig.style.left = currentLanes[lane];
        }

        window.addEventListener("keydown", e => {
            if (e.key === "ArrowLeft") move('left');
            if (e.key === "ArrowRight") move('right');
        });

        let startX = 0;
        document.addEventListener("touchstart", e => startX = e.touches[0].clientX);
        document.addEventListener("touchend", e => {
            const dx = e.changedTouches[0].clientX - startX;
            if (dx > 30) move('right');
            if (dx < -30) move('left');
        });

        document.getElementById("startBtn").onclick = startGame;
        document.getElementById("closeBtn").onclick = () => { if(isRunning) endGame(); };
        window.onresize = () => { currentLanes = getLaneX(); pig.style.left = currentLanes[lane]; };
    </script>
</body>
</html>
